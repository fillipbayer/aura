<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Aura</title>
  <link rel="icon" id="favicon" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Phiz JSSDK — habilita pz.miniProgram dentro do web-view -->
  <script src="https://phizclip-assets.phiz.live/phiz/jssdk-1.4.20.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --hold-ms: 2500;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fdf4f8;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* ─── BACKGROUND ─────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(205, 185, 202, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 70% 70% at 85% 5%,  rgba(190, 182, 215, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 90% 50% at 50% 105%, rgba(215, 202, 190, 0.11) 0%, transparent 60%);
      background-color: #f8f5f7;
      animation: bgTint 28s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes bgTint {
      0%   { background-color: #f8f5f7; } /* morno-neutro */
      20%  { background-color: #f5f5f9; } /* frio-neutro  */
      40%  { background-color: #f7f6f4; } /* quente-neutro */
      60%  { background-color: #f5f7f8; } /* azul-neutro  */
      80%  { background-color: #f7f5f6; }
      100% { background-color: #f8f5f7; }
    }

    /* ─── SCENE ──────────────────────────────────── */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 0;
    }

    /* ─── EYEBROW TITLE ──────────────────────────── */
    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #c9a8d4;
      margin-bottom: 52px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    .eyebrow.fade { opacity: 0; }

    /* ─── ORB AREA ───────────────────────────────── */
    .orb-area {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Outer ambient glow */
    .orb-ambient {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #a78bf5, #60a5fa 50%, #f472b6);
      filter: blur(36px);
      opacity: 0.35;
      animation: ambientPulse 3.5s ease-in-out infinite;
      transition: opacity 0.4s ease, width 0.4s ease, height 0.4s ease, filter 0.4s ease;
      pointer-events: none;
    }

    @keyframes ambientPulse {
      0%, 100% { transform: scale(1);    opacity: 0.35; }
      50%       { transform: scale(1.18); opacity: 0.5; }
    }

    /* SVG progress ring — fica dentro do floater para acompanhar o float */
    .ring-svg {
      position: absolute;
      /* orb = 210px, viewBox = 272px  →  offset = -(272-210)/2 = -31px */
      top:  -31px;
      left: -31px;
      width:  272px;
      height: 272px;
      transform: rotate(-90deg);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .ring-svg.show { opacity: 1; }

    .ring-track {
      fill: none;
      stroke: rgba(196,113,237,0.15);
      stroke-width: 2.5;
    }

    .ring-progress {
      fill: none;
      stroke: url(#rg);
      stroke-width: 3;
      stroke-linecap: round;
      transition: none;
    }

    /* The Orb itself */
    .orb-floater {
      position: relative;   /* necessário para o ring absolute dentro */
      width:  210px;
      height: 210px;
      animation: orbFloat 4s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-floater.paused { animation-play-state: paused; }

    .orb {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      background: conic-gradient(from 0deg, #c084fc, #60a5fa, #818cf8, #f472b6, #c084fc);
      box-shadow:
        0 0 0   2px rgba(160,130,245,0.15),
        0 0 30px rgba(129,140,248,0.45),
        0 0 70px rgba(192,132,252,0.20),
        inset 0 0 50px rgba(255,255,255,0.08);
      animation: orbColorSpin 9s linear infinite;
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease;
      will-change: transform;
    }

    /* Highlight sheen on orb */
    .orb::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.55) 0%, transparent 55%);
      pointer-events: none;
    }

    /* Inner fluid blob */
    .orb::after {
      content: '';
      position: absolute;
      width: 160%;
      height: 160%;
      top: -30%;
      left: -30%;
      border-radius: 40% 60% 55% 45% / 45% 35% 65% 55%;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      animation: blobMorph 6s ease-in-out infinite alternate;
    }

    @keyframes blobMorph {
      0%   { border-radius: 40% 60% 55% 45% / 45% 35% 65% 55%; }
      33%  { border-radius: 55% 45% 40% 60% / 60% 55% 45% 40%; }
      66%  { border-radius: 60% 40% 60% 40% / 40% 60% 40% 60%; }
      100% { border-radius: 45% 55% 45% 55% / 55% 45% 55% 45%; }
    }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0px);   }
      50%       { transform: translateY(-14px); }
    }

    @keyframes orbColorSpin {
      from { filter: hue-rotate(0deg)   brightness(1); }
      to   { filter: hue-rotate(360deg) brightness(1); }
    }

    /* Hold state */
    .orb.is-holding {
      transform: scale(1.16);
      box-shadow:
        0 0 0   3px rgba(160,130,245,0.3),
        0 0 50px rgba(129,140,248,0.75),
        0 0 100px rgba(244,114,182,0.45),
        0 0 180px rgba(129,140,248,0.25),
        inset 0 0 50px rgba(255,255,255,0.12);
      animation: orbColorSpin 3s linear infinite, orbHoldPulse 0.8s ease-in-out infinite;
    }

    @keyframes orbHoldPulse {
      0%, 100% { transform: scale(1.16); }
      50%       { transform: scale(1.20); }
    }

    /* Explosion */
    .orb.is-exploding {
      animation: orbExplode 0.65s cubic-bezier(0.2, 0, 0.8, 1) forwards !important;
    }

    @keyframes orbExplode {
      0%   { transform: scale(1.18); opacity: 1; filter: hue-rotate(180deg) brightness(1.5); }
      25%  { transform: scale(1.5);  opacity: 1; filter: hue-rotate(280deg) brightness(2); }
      55%  { transform: scale(2.2);  opacity: 0.7; filter: blur(8px) brightness(2.5); }
      100% { transform: scale(3.5);  opacity: 0;   filter: blur(25px); }
    }

    @keyframes orbReform {
      0%   { transform: scale(0); opacity: 0; filter: blur(20px); }
      60%  { transform: scale(1.12); opacity: 1; filter: blur(0px); }
      80%  { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ─── HINT TEXT ──────────────────────────────── */
    .hint-wrap {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    .hint-wrap.fade { opacity: 0; }

    .hint-main {
      font-size: 11px;
      color: #bf9dcc;
      letter-spacing: 0.3px;
      text-align: center;
    }

    .hint-sub {
      font-size: 10px;
      color: #d4b8de;
      letter-spacing: 0.2px;
      text-align: center;
    }

    /* ─── PARTICLES ──────────────────────────────── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .p {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      animation: pFly var(--d) var(--ease) var(--delay) forwards;
    }

    @keyframes pFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      70%  { opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ─── MESSAGE OVERLAY ────────────────────────── */
    .msg-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }

    .msg-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .msg-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(253, 240, 248, 0.72);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
    }

    .msg-card {
      position: relative;
      z-index: 1;
      text-align: center;
      transform: translateY(28px) scale(0.97);
      transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 360px;
      width: 100%;
    }

    .msg-overlay.show .msg-card {
      transform: translateY(0) scale(1);
    }

    /* Orb-like icon in message */
    .msg-orb {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #c084fc, #60a5fa, #818cf8, #f472b6, #c084fc);
      margin: 0 auto 32px;
      box-shadow: 0 8px 40px rgba(129,140,248,0.5), 0 0 0 8px rgba(129,140,248,0.08);
      animation: orbColorSpin 6s linear infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .msg-orb::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 33% 28%, rgba(255,255,255,0.5) 0%, transparent 55%);
    }

    .msg-quote-mark {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 56px;
      color: rgba(196,113,237,0.2);
      line-height: 1;
      margin-bottom: -12px;
      display: block;
    }

    .msg-text {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: clamp(18px, 5vw, 24px);
      line-height: 1.55;
      color: #2a1535;
      font-style: italic;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.1px;
    }

    .msg-line {
      width: 36px;
      height: 2px;
      background: linear-gradient(90deg, #c084fc, #60a5fa);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .msg-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a8d4;
      margin-bottom: 32px;
      display: block;
    }

    /* Botão principal: COMPARTILHAR */
    .share-btn-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 50px;
      background: linear-gradient(135deg, #c084fc, #818cf8 50%, #60a5fa);
      color: #fff;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      outline: none;
      box-shadow: 0 8px 32px rgba(129,140,248,0.45);
      -webkit-appearance: none;
    }
    .share-btn-main:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(129,140,248,0.3); }

    /* Botão discreto: voltar */
    .msg-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      border: none;
      border-radius: 50px;
      background: transparent;
      color: #b0a0c0;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.2s ease;
      outline: none;
      -webkit-appearance: none;
    }
    .msg-btn:active { color: #8070a0; }

    /* ─── FLOATING SPARKLES ──────────────────────── */
    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 18;
      font-size: var(--fs);
      color: var(--c);
      animation: sparkAnim var(--dur) ease-out forwards;
      line-height: 1;
    }

    @keyframes sparkAnim {
      0%   { opacity: 0; transform: scale(0) rotate(0deg)   translateY(0); }
      25%  { opacity: 1; transform: scale(1) rotate(60deg)  translateY(-8px); }
      75%  { opacity: 0.7; }
      100% { opacity: 0; transform: scale(0.3) rotate(160deg) translateY(-30px); }
    }

    /* ─── MSG ACTIONS — share em destaque ──────── */
    .msg-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ícone-share antigo não usado */
    .share-btn { display: none; }

    /* ─── SHARE OVERLAY ──────────────────────────── */
    .share-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(30,10,40,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .share-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .share-card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 320px;
      transform: translateY(20px) scale(0.96);
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .share-overlay.show .share-card-wrap {
      transform: translateY(0) scale(1);
    }

    /* fechar — topo centralizado */
    .share-close-btn {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.78);
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      transition: all 0.2s ease;
      border-radius: 999px;
    }
    .share-close-btn:active { transform: scale(0.95); opacity: 0.7; }

    #shareCanvas {
      width: 280px;
      height: 280px;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(130,50,180,0.35), 0 0 0 1px rgba(255,255,255,0.1);
      display: block;
    }

    .share-actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .share-action-btn {
      flex: 1;
      padding: 13px 0;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      outline: none;
      -webkit-appearance: none;
      transition: all 0.2s ease;
    }
    /* Compartilhar — destaque gradient Aura */
    .share-action-btn.primary {
      background: linear-gradient(135deg, #c084fc, #818cf8 50%, #60a5fa);
      color: #fff;
      box-shadow: 0 6px 24px rgba(129,140,248,0.45);
    }
    /* Copiar — ghost */
    .share-action-btn.ghost {
      background: rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.18);
    }
    .share-action-btn:active { transform: scale(0.95); }

    .share-tip {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.3px;
      text-align: center;
    }

    /* ─── DONATION BUTTON (dentro da msg-overlay) ── */
    .donate-bar {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    .donate-btn {
      pointer-events: all;
      background: transparent;
      border: 1px solid rgba(192,132,252,0.28);
      color: rgba(192,132,252,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 50px;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      transition: all 0.25s ease;
    }
    .donate-btn:active {
      background: rgba(192,132,252,0.1);
      border-color: rgba(192,132,252,0.55);
      color: rgba(192,132,252,0.9);
      transform: scale(0.96);
    }

    /* ─── DONATION OVERLAY ───────────────────────── */
    .donate-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(14,10,24,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .donate-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .donate-card {
      background: linear-gradient(160deg, #1c1230 0%, #130e20 100%);
      border: 1px solid rgba(192,132,252,0.18);
      border-bottom: none;
      border-radius: 28px 28px 0 0;
      padding: 32px 28px 48px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      position: relative;
      transform: translateY(50px);
      transition: transform 0.35s cubic-bezier(0.34,1.16,0.64,1);
    }
    .donate-overlay.show .donate-card {
      transform: translateY(0);
    }
    .donate-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      font-size: 17px;
      line-height: 1;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .donate-close:active { background: rgba(255,255,255,0.12); }
    .donate-emoji { font-size: 34px; line-height: 1; margin-bottom: 2px; }
    .donate-title {
      font-size: 19px;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      text-align: center;
    }
    .donate-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.42);
      text-align: center;
      line-height: 1.55;
      max-width: 280px;
    }
    .donate-amount {
      font-size: 44px;
      font-weight: 300;
      color: #c084fc;
      letter-spacing: -1px;
      line-height: 1;
      margin: 4px 0;
    }
    .donate-pay-btn {
      width: 100%;
      padding: 15px 0;
      background: linear-gradient(135deg, #c084fc, #818cf8 50%, #60a5fa);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(129,140,248,0.38);
      transition: all 0.2s ease;
      -webkit-appearance: none;
      outline: none;
      margin-top: 6px;
    }
    .donate-pay-btn:active { transform: scale(0.97); opacity: 0.9; }
    .donate-pay-btn:disabled { opacity: 0.6; cursor: default; }
    .donate-note {
      font-size: 10px;
      color: rgba(255,255,255,0.22);
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* ─── TOAST ──────────────────────────────────── */
    @keyframes fadeInOut {
      0%   { opacity:0; transform:translateX(-50%) translateY(10px); }
      15%  { opacity:1; transform:translateX(-50%) translateY(0); }
      75%  { opacity:1; transform:translateX(-50%) translateY(0); }
      100% { opacity:0; transform:translateX(-50%) translateY(-8px); }
    }

    /* ─── FLASH OVERLAY ─────────────────────────── */
    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,200,230,0.9) 0%, transparent 70%);
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s ease;
    }
    .flash.pop { opacity: 1; }
  </style>
</head>
<body>

  <div class="bg" id="bg"></div>
  <div id="particles"></div>
  <div class="flash" id="flash"></div>

  <!-- Main scene -->
  <div class="scene">
    <div class="eyebrow" id="eyebrow">aura</div>

    <div class="orb-area" id="orbArea">

      <div class="orb-ambient" id="ambient"></div>

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function startHoldSound() {
      try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        const dur = HOLD_MS / 1000;

        // Filtro passa-baixa que se abre com o progresso
        holdFilter = ctx.createBiquadFilter();
        holdFilter.type = 'bandpass';
        holdFilter.frequency.setValueAtTime(300, now);
        holdFilter.frequency.linearRampToValueAtTime(1800, now + dur);
        holdFilter.Q.setValueAtTime(1.5, now);

        // Oscilador principal — sobe do grave ao agudo
        holdOsc = ctx.createOscillator();
        holdOsc.type = 'sine';
        holdOsc.frequency.setValueAtTime(130, now);
        holdOsc.frequency.linearRampToValueAtTime(520, now + dur);

        // Segundo oscilador harmônico — cria "tensão"
        const holdOsc2 = ctx.createOscillator();
        holdOsc2.type = 'triangle';
        holdOsc2.frequency.setValueAtTime(195, now);
        holdOsc2.frequency.linearRampToValueAtTime(780, now + dur);

        const osc2Gain = ctx.createGain();
        osc2Gain.gain.setValueAtTime(0.04, now);
        osc2Gain.gain.linearRampToValueAtTime(0.09, now + dur);

        holdGain = ctx.createGain();
        holdGain.gain.setValueAtTime(0, now);
        holdGain.gain.linearRampToValueAtTime(0.13, now + 0.25);

        holdOsc.connect(holdFilter);
        holdOsc2.connect(osc2Gain);
        osc2Gain.connect(holdFilter);
        holdFilter.connect(holdGain);
        holdGain.connect(ctx.destination);

        holdOsc.start(now);
        holdOsc2.start(now);
        holdOsc2.stop(now + dur + 0.2);
        // holdOsc é parado manualmente em stopHoldSound
      } catch(e) {}
    }

    function stopHoldSound(immediate) {
      try {
        if (holdOsc && audioCtx) {
          if (immediate) {
            holdGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.04);
            holdOsc.stop(audioCtx.currentTime + 0.08);
          } else {
            holdGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.08);
            holdOsc.stop(audioCtx.currentTime + 0.2);
          }
        }
      } catch(e) {}
      holdOsc = null; holdGain = null; holdFilter = null;
    }

    function playExplosionSound() {
      try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;

        // Master compressor para manter tudo elegante e controlado

        comp.threshold.value = -18;
        comp.ratio.value = 2.5;
        comp.attack.value = 0.008;
        comp.release.value = 0.3;
        comp.connect(ctx.destination);

        // Camada principal: um lift elegante, como uma conquista importante.
        const lift = ctx.createOscillator();
        const liftGain = ctx.createGain();
        const liftFilter = ctx.createBiquadFilter();
        lift.type = 'sawtooth';
        lift.frequency.setValueAtTime(220, now);
        lift.frequency.exponentialRampToValueAtTime(440, now + 0.28);
        liftFilter.type = 'lowpass';
        liftFilter.frequency.setValueAtTime(700, now);
        liftFilter.frequency.exponentialRampToValueAtTime(2600, now + 0.3);
        liftGain.gain.setValueAtTime(0.001, now);
        liftGain.gain.exponentialRampToValueAtTime(0.035, now + 0.06);
        liftGain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
        lift.connect(liftFilter);
        liftFilter.connect(liftGain);
        liftGain.connect(comp);
        lift.start(now);
        lift.stop(now + 0.6);

        // Acorde com sensação de vitória sofisticada: Gmaj9 aberto e arejado.
        const chord = [392.0, 493.88, 587.33, 739.99];
        chord.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq * 0.995, now + i * 0.045);
          osc.frequency.exponentialRampToValueAtTime(freq, now + i * 0.045 + 0.14);
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(1800, now + i * 0.045);
          gain.gain.setValueAtTime(0.001, now + i * 0.045);
          gain.gain.exponentialRampToValueAtTime(0.045 - i * 0.006, now + i * 0.045 + 0.09);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.045 + 1.15);
          osc.connect(filter);
          filter.connect(gain);
          gain.connect(comp);
          osc.start(now + i * 0.045);
          osc.stop(now + i * 0.045 + 1.2);
        });

        // Brilho final: duas notas altas suaves, tipo cristal premium.
        const shineNotes = [987.77, 1318.5];
        shineNotes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const delay = 0.2 + i * 0.11;
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + delay);
          gain.gain.setValueAtTime(0.001, now + delay);
          gain.gain.exponentialRampToValueAtTime(0.022, now + delay + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.62);
          osc.connect(gain);
          gain.connect(comp);
          osc.start(now + delay);
          osc.stop(now + delay + 0.66);
        });

        // Ar sutil para sensação de expansão e brilho.
        const bufSize = ctx.sampleRate * 0.18;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = 'bandpass';
        noiseFilter.frequency.value = 2400;
        noiseFilter.Q.value = 0.5;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.012, now + 0.03);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(comp);
        noise.start(now);
        noise.stop(now + 0.19);
      } catch(e) {}
    }

    /* ─── HOLD LOGIC ────────────────────────────────────────── */
    function onHoldStart(e) {
      if (completed) return;
      e.preventDefault();
      holding   = true;
      holdStart = performance.now();

      floater.classList.add('paused');
      orb.classList.add('is-holding');
      ringSvg.classList.add('show');
      eyebrow.classList.add('fade');
      hintWrap.classList.add('fade');

      ambient.style.opacity = '0.7';
      ambient.style.width   = '250px';
      ambient.style.height  = '250px';
      ambient.style.filter  = 'blur(50px)';

      startHoldSound();
      rafId = requestAnimationFrame(tick);
    }

    function tick(now) {
      if (!holding) return;
      const elapsed = now - holdStart;
      const p = Math.min(elapsed / HOLD_MS, 1);
      setRingProgress(p);

      if (p >= 1) {
        explode();
        return;
      }
      rafId = requestAnimationFrame(tick);
    }

    function onHoldEnd() {
      if (!holding || completed) return;
      holding = false;
      cancelAnimationFrame(rafId);
      setRingProgress(0);

      floater.classList.remove('paused');
      orb.classList.remove('is-holding');
      ringSvg.classList.remove('show');
      eyebrow.classList.remove('fade');
      hintWrap.classList.remove('fade');

      ambient.style.opacity = '0.35';
      ambient.style.width   = '200px';
      ambient.style.height  = '200px';
      ambient.style.filter  = 'blur(36px)';

      stopHoldSound(false);
    }

    /* ─── EXPLOSION ─────────────────────────────────────────── */
    function explode() {
      holding   = false;
      completed = true;
      cancelAnimationFrame(rafId);
      setRingProgress(1);
      stopHoldSound(true);
      playExplosionSound();

      ringSvg.classList.remove('show');
      orb.classList.remove('is-holding');
      orb.classList.add('is-exploding');

      // Flash
      flash.classList.add('pop');
      setTimeout(() => flash.classList.remove('pop'), 180);

      // Particles
      spawnParticles();

      // Reveal message
      setTimeout(showMessage, 580);
    }

    /* ─── PARTICLES ─────────────────────────────────────────── */
    const COLORS  = ['#c084fc','#818cf8','#60a5fa','#f472b6','#ffffff','#d0b8ff','#a5b4fc'];
    const EASINGS = [
      'cubic-bezier(0,0.9,0.57,1)',
      'cubic-bezier(0.2,1,0.6,1)',
      'ease-out'
    ];

    function spawnParticles() {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      const N  = 55;

      for (let i = 0; i < N; i++) {
        const el   = document.createElement('div');
        el.className = 'p';

        const size  = Math.random() * 14 + 4;
        const angle = (i / N) * 360 + (Math.random() - 0.5) * (360 / N) * 1.5;
        const dist  = Math.random() * 280 + 80;
        const tx    = Math.cos(angle * Math.PI / 180) * dist;
        const ty    = Math.sin(angle * Math.PI / 180) * dist;
        const dur   = Math.random() * 500 + 500;
        const delay = Math.random() * 80;
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const ease  = EASINGS[Math.floor(Math.random() * EASINGS.length)];

        el.style.cssText = `
          width:  ${size}px;
          height: ${size}px;
          left:   ${cx - size/2}px;
          top:    ${cy - size/2}px;
          background: ${color};
          box-shadow: 0 0 ${size*1.5}px ${color};
          --tx: ${tx}px;
          --ty: ${ty}px;
          --d:  ${dur}ms;
          --ease: ${ease};
          --delay: ${delay}ms;
        `;

        particles.appendChild(el);
        setTimeout(() => el.remove(), dur + delay + 50);
      }
    }

    /* ─── SPARKLES ──────────────────────────────────────────── */
    const SPARKS  = ['✦','✧','★','◆','✨','·'];
    const SCOLS   = ['#c084fc','#818cf8','#60a5fa','#f472b6'];

    function spawnSparkles() {
      const count = 12;
      for (let i = 0; i < count; i++) {
        const el  = document.createElement('div');
        el.className = 'spark';
        const fs  = Math.random() * 14 + 8;
        const dur = 1.8 + Math.random() * 1.2;
        el.textContent = SPARKS[Math.floor(Math.random() * SPARKS.length)];
        el.style.cssText = `
          left: ${10 + Math.random() * 80}%;
          top:  ${5  + Math.random() * 85}%;
          --fs:  ${fs}px;
          --c:   ${SCOLS[Math.floor(Math.random() * SCOLS.length)]};

          animation-delay: ${Math.random() * 0.6}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (dur + 0.6) * 1000 + 100);

    /* ─── SHOW MESSAGE ──────────────────────────────────────── */

      clearInterval(sparkIntervalId);

        msgIndex++;
        if (msgIndex >= shuffled.length) {

    /* ─── SHARE CARD ────────────────────────────────────────── */
    const APP_NAME = 'Aura';
    const shareOverlay  = document.getElementById('shareOverlay');
    const shareCanvas   = document.getElementById('shareCanvas');
    const phizShareBtn  = document.getElementById('phizShareBtn');
    const closeShareBtn = document.getElementById('closeShareBtn');
    const shareTip      = document.getElementById('shareTip');
    const shareBtn      = document.getElementById('shareBtn');

    function wrapText(ctx, text, x, y, maxW, lineH) {
      const words = text.split(' ');
      let line = '';
      const lines = [];
      words.forEach(w => {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line);
          line = w;
        } else { line = test; }
      });
      if (line) lines.push(line);
      const total = lines.length * lineH;
      const startY = y - total / 2 + lineH / 2;
      lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineH));
      return lines.length;
    }

    function drawShareCard(message) {
      const C = shareCanvas;
      const ctx = C.getContext('2d');
      const W = C.width, H = C.height;

      // Background — dark rich com cores do logo Aura
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0,   '#0d0520');
      bg.addColorStop(0.5, '#100828');
      bg.addColorStop(1,   '#050318');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Ambient blobs — roxo, azul, pink (cores do logo)
      const blobColors = [
        ['rgba(192,132,252,0.25)', W*0.1,  H*0.15, 320],  // roxo
        ['rgba(96,165,250,0.20)',  W*0.88, H*0.12, 280],  // azul
        ['rgba(244,114,182,0.22)', W*0.5,  H*0.9,  300],  // pink
      ];
      blobColors.forEach(([c, bx, by, r]) => {
        const g = ctx.createRadialGradient(bx, by, 0, bx, by, r);
        g.addColorStop(0, c);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      });

      // Decorative orb — cores do logo Aura
      const ox = W / 2, oy = H * 0.22;
      const orbG = ctx.createConicGradient(0, ox, oy);
      orbG.addColorStop(0,    '#c084fc');
      orbG.addColorStop(0.33, '#60a5fa');
      orbG.addColorStop(0.66, '#818cf8');
      orbG.addColorStop(0.85, '#f472b6');
      orbG.addColorStop(1,    '#c084fc');
      ctx.save();
      ctx.beginPath();
      ctx.arc(ox, oy, 72, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = orbG;
      ctx.fillRect(ox - 72, oy - 72, 144, 144);
      // Shine
      const shine = ctx.createRadialGradient(ox-22, oy-22, 0, ox, oy, 72);
      shine.addColorStop(0, 'rgba(255,255,255,0.45)');
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = shine;
      ctx.fillRect(ox - 72, oy - 72, 144, 144);
      ctx.restore();
      // Orb glow — roxo/azul Aura
      const glowG = ctx.createRadialGradient(ox, oy, 0, ox, oy, 150);
      glowG.addColorStop(0, 'rgba(129,140,248,0.35)');
      glowG.addColorStop(0.5, 'rgba(192,132,252,0.15)');
      glowG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glowG;
      ctx.fillRect(0, 0, W, H);

      // "Aura do dia" — abaixo do orb
      ctx.font = '300 26px -apple-system, Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.textAlign = 'center';
      ctx.fillText('Aura do dia', W / 2, H * 0.38);

      // Message text — sem aspas, fonte maior, mais presença
      ctx.font = 'italic 600 44px Georgia, serif';
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.textAlign = 'center';
      wrapText(ctx, message, W / 2, H * 0.57, W * 0.80, 62);

      // Divider line — gradiente Aura
      const lx = W / 2;
      const ly = H * 0.83;
      const grad2 = ctx.createLinearGradient(lx - 50, ly, lx + 50, ly);
      grad2.addColorStop(0, '#c084fc');
      grad2.addColorStop(0.5, '#818cf8');
      grad2.addColorStop(1, '#60a5fa');
      ctx.strokeStyle = grad2;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(lx - 40, ly);
      ctx.lineTo(lx + 40, ly);
      ctx.stroke();

      // App badge
      ctx.font = '500 22px -apple-system, Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.textAlign = 'center';
      ctx.fillText('\u2746 ' + APP_NAME + '  \u00B7  Phiz MiniApp', W / 2, H * 0.91);
    }

    async function openShareCard() {
      const message = shuffled[msgIndex];
      await document.fonts.ready;
      drawShareCard(message);
      shareOverlay.classList.add('show');
      shareTip.textContent = '';
    }

    function closeShareCard() {
      shareOverlay.classList.remove('show');
    }

    // Detecta se está rodando dentro do Phiz web-view
    function isPhizWebView() {
      return typeof pz !== 'undefined' ||
             /PhizApp|MicroMessenger/i.test(navigator.userAgent);
    }

    // Mostra a imagem em tela cheia para o usuário segurar e salvar no álbum.
    // Padrão necessário no Phiz/WeChat web-view, que não suporta Web Share com arquivos.
    function showImageToSave(blob) {
      const url = URL.createObjectURL(blob);
      const ov = document.createElement('div');
      ov.id = 'saveImgOv';
      ov.style.cssText = [
        'position:fixed;inset:0;z-index:9999',
        'background:rgba(0,0,0,0.93)',
        'display:flex;flex-direction:column',
        'align-items:center;justify-content:center;gap:14px',
        'padding:28px 20px',
        'touch-action:none'
      ].join(';');

      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = [
        'max-width:min(300px,80vw)',
        'max-height:min(300px,60vh)',
        'border-radius:18px',
        'box-shadow:0 12px 40px rgba(0,0,0,0.5)',
        'display:block'
      ].join(';');

      const hint1 = document.createElement('p');
      hint1.textContent = 'Segure a imagem para salvar no álbum';
      hint1.style.cssText = 'color:rgba(255,255,255,0.85);font-size:15px;text-align:center;font-family:Inter,sans-serif;margin:0';

      const hint2 = document.createElement('p');
      hint2.textContent = 'Depois compartilhe do álbum de fotos ✦';
      hint2.style.cssText = 'color:rgba(255,255,255,0.45);font-size:13px;text-align:center;font-family:Inter,sans-serif;margin:0';

      const close = document.createElement('button');
      close.textContent = '×';
      close.style.cssText = [
        'position:absolute;top:16px;right:16px',
        'width:36px;height:36px',
        'background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18)',
        'color:rgba(255,255,255,0.8);font-size:20px;line-height:1',
        'border-radius:50%;cursor:pointer',
        'display:flex;align-items:center;justify-content:center'
      ].join(';');
      close.onclick = () => { document.body.removeChild(ov); URL.revokeObjectURL(url); };

      ov.append(close, img, hint1, hint2);
      document.body.appendChild(ov);
    }

    // Compartilha a imagem canvas.
    // – Fora do Phiz: Web Share API com arquivo (WhatsApp, etc.)
    // – Dentro do Phiz web-view: mostra imagem para salvar no álbum e compartilhar
    async function phizShareFromCard() {
      return new Promise(resolve => {
        shareCanvas.toBlob(async blob => {
          const file = new File([blob], APP_NAME.toLowerCase() + '.png', { type: 'image/png' });

          // 1º — Web Share API com arquivo (funciona no browser E dentro do Phiz web-view)
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({ title: '\u2746 ' + APP_NAME, files: [file] });
              resolve(); return;
            } catch(e) {
              // Usuário cancelou → para aqui. Erro de suporte → continua para fallback
              if (e && e.name === 'AbortError') { resolve(); return; }
            }
          }

          // 2º — Dentro do Phiz: salva no álbum via API nativa (pz.saveImageToPhotosAlbum)
          if (isPhizWebView() && typeof pz !== 'undefined' && typeof pz.saveImageToPhotosAlbum === 'function') {
            const dataUrl = shareCanvas.toDataURL('image/png');
            pz.saveImageToPhotosAlbum({
              filePath: dataUrl,
              success: function() { showToast('✦ imagem salva no álbum'); resolve(); },
              fail:    function() { showImageToSave(blob); resolve(); }
            });
            return;
          }

          // 3º — Web Share só com texto (fallback sem arquivo)
          if (navigator.share) {
            try {
              await navigator.share({
                title: '\u2746 ' + APP_NAME,
                text: shuffled[msgIndex] + '\n\n\u2014 ' + APP_NAME + ' \u00B7 Phiz MiniApp'
              });
              resolve(); return;
            } catch(e) {}
          }

          // 4º — Overlay manual (segurar para salvar)
          if (isPhizWebView()) { showImageToSave(blob); resolve(); return; }

          resolve();
        }, 'image/png');
      });
    }


    /* ─── PHIZ NATIVE SHARE ─────────────────────────────────── */
    // onShareAppMessage é chamado pelo SDK Phiz quando o usuário
    // toca no botão de compartilhar nativo (via pz.showShareMenu)

    if (typeof pz !== 'undefined') {

    // Exibe um toast flutuante

    /* ─── FAVICON dinâmico — logo Aura ─────────────────────── */
    (function generateFavicon() {
      const c = document.createElement('canvas');
      c.width = c.height = 128;
      const x = c.getContext('2d');
      const cx = 64, cy = 64, r = 58;

      // Sombra suave
      const shadow = x.createRadialGradient(cx, cy+62, 0, cx, cy+62, 42);
      shadow.addColorStop(0, 'rgba(129,140,248,0.25)');
      shadow.addColorStop(1, 'rgba(0,0,0,0)');
      x.fillStyle = shadow;
      x.fillRect(0, 0, 128, 128);

      // Clip circular
      x.save();
      x.beginPath();
      x.arc(cx, cy, r, 0, Math.PI*2);
      x.clip();

      // Camada 1: base roxo→azul
      const g1 = x.createLinearGradient(0, 0, 128, 128);
      g1.addColorStop(0,    '#b39af5');
      g1.addColorStop(0.5,  '#818cf8');
      g1.addColorStop(1,    '#60a5fa');
      x.fillStyle = g1;
      x.fillRect(0, 0, 128, 128);

      // Camada 2: pink/magenta do centro-baixo
      const g2 = x.createRadialGradient(cx, cy+30, 0, cx, cy+30, 72);
      g2.addColorStop(0,   'rgba(244,114,182,0.92)');
      g2.addColorStop(0.45,'rgba(244,114,182,0.55)');
      g2.addColorStop(1,   'rgba(244,114,182,0)');
      x.fillStyle = g2;
      x.fillRect(0, 0, 128, 128);

      // Camada 3: destaque branco central (efeito de luz)
      const g3 = x.createRadialGradient(cx, cy+8, 0, cx, cy, 30);
      g3.addColorStop(0,   'rgba(255,255,255,0.65)');
      g3.addColorStop(0.5, 'rgba(255,255,255,0.2)');
      g3.addColorStop(1,   'rgba(255,255,255,0)');
      x.fillStyle = g3;
      x.fillRect(0, 0, 128, 128);

      x.restore();

      const link = document.getElementById('favicon');
      link.href = c.toDataURL('image/png');
    })();
  </script>
